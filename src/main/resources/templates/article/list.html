<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
</head>
<body>
<h1>게시글 목록</h1>

<a href="/article/create"><button>등록</button></a>

<ul>
    <li th:each="article : ${articles}">
        <a th:href="@{/article/detail/{id}(id=${article.id})}"
           th:text="${article.title}"></a>
    </li>
</ul>
</body>
</html>
